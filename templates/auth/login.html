{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Angan Baari</title>
    <link rel="shortcut icon" href="{% static 'favicon.ico' %}">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <style>
        .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: var(--cream); position: relative; }
        .back-to-shop { position: absolute; top: 24px; left: 24px; display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 50px; background: var(--white); color: var(--moss); font-size: 0.82rem; font-weight: 500; text-decoration: none; box-shadow: 0 2px 10px rgba(26,47,30,0.08); transition: background 0.2s, transform 0.2s; }
        .back-to-shop:hover { background: var(--moss); color: white; transform: translateX(-2px); }
        .auth-logo-link { display: block; text-decoration: none; }
        @media (max-width: 480px) {
            .back-to-shop { top: 14px; left: 14px; padding: 7px 13px; font-size: 0.78rem; }
            .auth-card { padding-top: 60px; }
        }
        .auth-card { background: var(--white); border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(26,47,30,0.12); }
        .auth-logo { text-align: center; margin-bottom: 32px; }
        .auth-logo i { font-size: 2rem; color: var(--moss); }
        .auth-logo h1 { font-family: var(--font-display); font-size: 1.8rem; color: var(--forest); margin: 8px 0 4px; }
        .auth-logo p { font-size: 0.85rem; color: var(--text-muted); }
        .auth-title { font-family: var(--font-display); font-size: 1.4rem; color: var(--forest); margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.8rem; font-family: var(--font-accent); letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--mist); border-radius: 10px; font-size: 0.95rem; font-family: var(--font-body); color: var(--forest); outline: none; transition: border-color 0.2s; box-sizing: border-box; }
        .form-group input:focus { border-color: var(--moss); }
        .btn-auth { width: 100%; padding: 14px; background: var(--forest); color: white; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 600; font-family: var(--font-body); cursor: pointer; transition: background 0.3s; margin-top: 8px; }
        .btn-auth:hover { background: var(--moss); }
        .auth-links { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--text-muted); }
        .auth-links a { color: var(--moss); font-weight: 500; }
        .messages { margin-bottom: 16px; }
        .msg { padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 8px; }
        .msg-error { background: #fef2f2; color: #c0392b; border: 1px solid #fecaca; }
        .msg-success { background: #f0fdf4; color: var(--moss); border: 1px solid #bbf7d0; }
        .divider { text-align: center; margin: 20px 0; color: var(--text-muted); font-size: 0.8rem; position: relative; }
        .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--mist); }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
    </style>
</head>
<body>
<div class="auth-page">
    <a href="{% url 'shop' %}" class="back-to-shop"><i class="fas fa-arrow-left"></i> Back to Shop</a>
    <div class="auth-card">
        <a href="/" class="auth-logo-link">
        <div class="auth-logo">
            <i class="fas fa-seedling"></i>
            <h1>आँगन बारी</h1>
            <p>Angan Baari · Organic Farm</p>
        </div>
        </a>

        <h2 class="auth-title">Welcome back 🌿</h2>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="msg msg-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="your@email.com" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Your password" required>
            </div>
            <button type="submit" class="btn-auth">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="auth-links">
            <a href="{% url 'forgot_password' %}">Forgot password?</a>
            <br><br>
            Don't have an account? <a href="{% url 'signup' %}">Sign up</a>
        </div>
    </div>
</div>
</body>
</html>
